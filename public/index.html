<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>pi remote</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #171a21;
    --panel-2: #1e222b;
    --border: #2a2f3a;
    --text: #e6e9ef;
    --muted: #8b93a3;
    --accent: #7aa2f7;
    --accent-dim: #3d5285;
    --green: #9ece6a;
    --red: #f7768e;
    --yellow: #e0af68;
    --user-bubble: #26436e;
    --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }

  /* scrollbars — thin and dark so they blend with the page */
  * { scrollbar-width: thin; scrollbar-color: #333a47 transparent; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb {
    background: #333a47;
    border-radius: 4px;
  }
  ::-webkit-scrollbar-thumb:hover { background: #414a5b; }
  ::-webkit-scrollbar-corner { background: transparent; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font: 15px/1.5 system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    display: flex;
    flex-direction: column;
  }

  /* ---------- header ---------- */
  header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 14px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  header .dot {
    width: 9px; height: 9px; border-radius: 50%;
    background: var(--red);
    flex-shrink: 0;
  }
  header .dot.ok { background: var(--green); }
  header .dot.busy { background: var(--yellow); animation: pulse 1s infinite; }
  @keyframes pulse { 50% { opacity: .35; } }
  header .title {
    font-weight: 600;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    min-width: 0;
  }
  header .spacer { flex: 1; }
  .chip {
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 999px;
    padding: 2px 10px;
    font-size: 12px;
    cursor: pointer;
    white-space: nowrap;
    user-select: none;
  }
  .chip:hover { color: var(--text); border-color: var(--accent-dim); }
  #menuBtn { font-size: 16px; line-height: 1; padding: 2px 9px; }

  /* ---------- menu ---------- */
  #menu {
    position: absolute;
    top: 44px; right: 10px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 10px;
    box-shadow: 0 8px 30px rgba(0,0,0,.5);
    display: none;
    flex-direction: column;
    min-width: 200px;
    z-index: 30;
    overflow: hidden;
  }
  #menu.open { display: flex; }
  #menu button {
    all: unset;
    padding: 10px 14px;
    cursor: pointer;
    font-size: 14px;
  }
  #menu button:hover { background: var(--accent-dim); }

  /* ---------- messages ---------- */
  #scroller { flex: 1; overflow-y: auto; scroll-behavior: smooth; }

  /* ---------- main row: chat column + interfaces sidebar ---------- */
  #main { flex: 1; display: flex; min-height: 0; }
  #chatcol { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  #ifaces {
    width: 230px;
    flex-shrink: 0;
    border-left: 1px solid var(--border);
    background: var(--panel);
    overflow-y: auto;
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .iface-block {
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--panel-2);
    overflow: hidden;
    flex-shrink: 0;
  }
  .iface-block .preview {
    position: relative;
    height: 130px;
    background: #fff;
    cursor: pointer;
  }
  .iface-block .preview iframe {
    width: 400%; height: 400%;
    transform: scale(0.25);
    transform-origin: 0 0;
    border: 0;
    pointer-events: none; /* the block itself handles clicks */
  }
  .iface-block .preview .hit { position: absolute; inset: 0; }
  .iface-block .cap {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 8px;
    font-size: 12px;
    border-top: 1px solid var(--border);
  }
  .iface-block .cap .lbl {
    flex: 1; min-width: 0;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    color: var(--muted);
  }
  .iface-block .cap .x { cursor: pointer; color: var(--muted); padding: 0 3px; }
  .iface-block .cap .x:hover { color: var(--red); }
  /* interface blocks laid out as a grid inside the Interfaces modal */
  .iface-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 10px;
    margin-bottom: 4px;
  }
  #ifaceAdd {
    border: 2px dashed var(--border);
    border-radius: 10px;
    height: 90px;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 38px;
    color: var(--muted);
    cursor: pointer;
    user-select: none;
  }
  #ifaceAdd:hover { color: var(--accent); border-color: var(--accent-dim); }
  /* on small screens the sidebar becomes a slide-over drawer, toggled by a
     header chip that only appears there */
  #ifaceChip, #cfgChip { display: none; }
  #cfgChip { max-width: 34vw; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  @media (max-width: 760px) {
    /* model + thinking collapse into one combined chip */
    #modelChip, #thinkChip { display: none; }
    #cfgChip { display: inline-block; }
    #ifaces { display: none; }
    #ifaces.open {
      display: flex;
      position: fixed;
      top: 0; right: 0; bottom: 0;
      width: min(78vw, 320px);
      z-index: 55;
      box-shadow: -8px 0 30px rgba(0,0,0,.5);
      border-left: 1px solid var(--border);
    }
    #ifaceChip { display: inline-flex; }
  }
  #messages {
    max-width: 860px;
    margin: 0 auto;
    padding: 16px 12px 8px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .msg { min-width: 0; }
  .msg.user {
    align-self: flex-end;
    max-width: 85%;
    background: var(--user-bubble);
    border-radius: 14px 14px 4px 14px;
    padding: 8px 13px;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .msg.assistant { align-self: stretch; }
  .msg.assistant .md { word-break: break-word; }
  .msg .meta {
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
  }
  .msg.error-msg {
    align-self: stretch;
    border: 1px solid var(--red);
    border-radius: 8px;
    padding: 8px 12px;
    color: var(--red);
    font-size: 13px;
    white-space: pre-wrap;
    word-break: break-word;
  }

  /* markdown */
  .md p { margin: 0 0 .7em; }
  .md p:last-child { margin-bottom: 0; }
  .md h1, .md h2, .md h3, .md h4 { margin: .9em 0 .4em; line-height: 1.3; }
  .md h1 { font-size: 1.35em; } .md h2 { font-size: 1.2em; } .md h3 { font-size: 1.08em; }
  .md ul, .md ol { margin: 0 0 .7em; padding-left: 1.5em; }
  .md li { margin: .15em 0; }
  .md code {
    font-family: var(--mono);
    font-size: .88em;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1px 5px;
  }
  .md pre {
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    overflow-x: auto;
    margin: 0 0 .7em;
  }
  .md pre code { background: none; border: none; padding: 0; font-size: 13px; }
  .md .codeblock { position: relative; margin: 0 0 .7em; }
  .md .codeblock pre { margin: 0; }
  .md .codeblock .code-lang {
    position: absolute;
    top: 5px; right: 9px;
    font-size: 10.5px;
    color: var(--muted);
    background: var(--panel-2);
    padding: 0 5px;
    border-radius: 4px;
    user-select: none;
    pointer-events: none;
  }

  /* syntax highlighting */
  .tok-com { color: #565f89; font-style: italic; }
  .tok-str { color: #9ece6a; }
  .tok-num { color: #ff9e64; }
  .tok-kw  { color: #bb9af7; }
  .tok-fn  { color: #7aa2f7; }
  .tok-lit { color: #e0af68; }
  .tok-var { color: #7dcfff; }
  .md blockquote {
    border-left: 3px solid var(--accent-dim);
    margin: 0 0 .7em;
    padding: 2px 0 2px 12px;
    color: var(--muted);
  }
  .md a { color: var(--accent); }
  .md table { border-collapse: collapse; margin: 0 0 .7em; display: block; overflow-x: auto; }
  .md th, .md td { border: 1px solid var(--border); padding: 4px 10px; font-size: 13.5px; }
  .md hr { border: none; border-top: 1px solid var(--border); margin: 1em 0; }

  /* thinking + tools */
  details.block {
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--panel);
    margin: 4px 0;
    overflow: hidden;
  }
  details.block > summary {
    cursor: pointer;
    padding: 7px 12px;
    font-size: 13px;
    color: var(--muted);
    list-style: none;
    display: flex;
    align-items: center;
    gap: 8px;
    user-select: none;
  }
  details.block > summary::-webkit-details-marker { display: none; }
  details.block > summary::before { content: "▸"; transition: transform .15s; flex-shrink: 0; }
  details.block[open] > summary::before { transform: rotate(90deg); }
  details.block > .body {
    padding: 8px 12px 10px;
    border-top: 1px solid var(--border);
    font-size: 13px;
  }
  details.thinking > summary { color: var(--yellow); font-style: italic; }
  details.thinking > .body { color: var(--muted); white-space: pre-wrap; word-break: break-word; }

  .tool summary .tname { color: var(--accent); font-family: var(--mono); font-size: 12.5px; }
  .tool summary .targ {
    color: var(--muted); font-family: var(--mono); font-size: 12px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    min-width: 0; flex: 1;
  }
  .tool summary .status { margin-left: auto; flex-shrink: 0; font-size: 12px; }
  .tool .status.running { color: var(--yellow); }
  .tool .status.ok { color: var(--green); }
  .tool .status.err { color: var(--red); }
  .tool .body pre {
    margin: 0;
    font-family: var(--mono);
    font-size: 12.5px;
    white-space: pre-wrap;
    word-break: break-word;
    max-height: 350px;
    overflow-y: auto;
  }
  .tool .args-pre { color: var(--muted); margin-bottom: 8px !important; }
  .tool .diff { font-family: var(--mono); font-size: 12.5px; margin-bottom: 8px; max-height: 350px; overflow-y: auto; }
  .tool .diff .diff-line { white-space: pre-wrap; word-break: break-word; padding: 0 4px; }
  .tool .diff .diff-del { color: var(--red); background: rgba(255, 80, 80, 0.08); }
  .tool .diff .diff-add { color: var(--green); background: rgba(80, 255, 120, 0.08); }
  .tool .diff .diff-hdr { color: var(--muted); margin-top: 6px; }

  /* ---------- composer ---------- */
  #composer {
    flex-shrink: 0;
    background: var(--panel);
    border-top: 1px solid var(--border);
    padding: 10px 12px calc(10px + env(safe-area-inset-bottom));
  }
  #composer .inner {
    max-width: 860px;
    margin: 0 auto;
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }
  #input {
    flex: 1;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font: inherit;
    padding: 9px 12px;
    resize: none;
    max-height: 200px;
    outline: none;
  }
  #input:focus { border-color: var(--accent-dim); }
  #attachBtn, .attach-btn {
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--muted);
    font: inherit;
    font-size: 16px;
    padding: 8px 11px;
    cursor: pointer;
    flex-shrink: 0;
  }
  #attachBtn:hover, .attach-btn:hover { color: var(--text); border-color: var(--accent-dim); }
  #modal .m-option.file { padding: 6px 12px; margin-bottom: 4px; }
  #modal .m-option.file::before { content: "📄 "; }
  #modal .m-option.file .f-size { color: var(--muted); font-size: 11px; margin-left: 8px; }
  .btn {
    background: var(--accent);
    color: #10131a;
    border: none;
    border-radius: 12px;
    font: inherit;
    font-weight: 600;
    padding: 9px 16px;
    cursor: pointer;
    flex-shrink: 0;
  }
  .btn:disabled { opacity: .45; cursor: default; }
  .btn.stop { background: var(--red); }
  #statusbar {
    max-width: 860px;
    margin: 4px auto 0;
    font-size: 11.5px;
    color: var(--muted);
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
  }

  /* ---------- modal ---------- */
  #overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.55);
    display: none;
    align-items: center; justify-content: center;
    z-index: 50;
    padding: 16px;
  }
  #overlay.open { display: flex; }
  #modal {
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 12px;
    max-width: 480px;
    width: 100%;
    max-height: 80vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #modal .m-title { padding: 14px 16px 6px; font-weight: 600; }
  #modal .m-body { padding: 6px 16px 14px; overflow-y: auto; }
  #modal .m-body input[type=text],
  #modal .m-body input[type=number],
  #modal .m-body textarea {
    width: 100%;
    box-sizing: border-box;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font: inherit;
    padding: 9px 12px;
    outline: none;
  }
  #modal .m-body input:focus,
  #modal .m-body textarea:focus { border-color: var(--accent-dim); }
  #modal .m-option {
    display: block; width: 100%; text-align: left;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font: inherit;
    padding: 8px 12px;
    margin-bottom: 6px;
    cursor: pointer;
  }
  #modal .m-option:hover { border-color: var(--accent); }
  #modal .m-option.current { border-color: var(--accent-dim); background: var(--user-bubble); }
  #modal .m-option .s-title {
    display: flex; gap: 8px; align-items: baseline;
    white-space: nowrap; overflow: hidden;
  }
  #modal .m-option .s-name { font-weight: 600; overflow: hidden; text-overflow: ellipsis; }
  #modal .m-option .s-date { color: var(--muted); font-size: 11.5px; flex-shrink: 0; margin-left: auto; }
  #modal .m-option .s-preview {
    color: var(--muted); font-size: 12.5px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin-top: 2px;
  }
  #modal .m-path {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
    padding: 4px 0 10px;
    word-break: break-all;
  }
  #modal .m-option.dir { padding: 6px 12px; margin-bottom: 4px; }
  .s-dot {
    flex-shrink: 0;
    width: 9px; height: 9px;
    border-radius: 50%;
    margin-right: 7px;
    background: var(--red);           /* no process */
    opacity: .55;
  }
  .s-dot.on { background: var(--green); opacity: 1; }   /* runner idle */
  .s-dot.busy {                                          /* runner working */
    background: var(--yellow); opacity: 1;
    animation: dotblink 1s ease-in-out infinite;
  }
  @keyframes dotblink { 0%, 100% { opacity: 1; } 50% { opacity: .25; } }
  #modal .m-option .s-del {
    flex-shrink: 0;
    margin-left: 6px;
    padding: 0 6px;
    border-radius: 6px;
    color: var(--muted);
    font-size: 14px;
    line-height: 1.4;
    cursor: pointer;
  }
  #modal .m-option .s-del:hover { color: var(--red); background: var(--panel); }
  /* the ■ glyph renders much larger than ✕ at equal font-size; shrink it
     and pin the line-height so both controls occupy the same box */
  #modal .m-option .s-stop { font-size: 21px; line-height: 19.6px; }
  #modal .s-folders { margin-top: 10px; border-top: 1px solid var(--border); padding-top: 8px; }
  #modal .s-folders > summary, #modal .s-folder > summary {
    cursor: pointer;
    color: var(--muted);
    font-size: 13px;
    padding: 4px 2px;
    user-select: none;
  }
  #modal .s-folders > summary:hover, #modal .s-folder > summary:hover { color: var(--text); }
  #modal .s-folder { margin-left: 10px; }
  #modal .s-folder > .m-option, #modal .s-folder > .m-path { margin-left: 12px; }
  #modal .m-option .s-stop:hover { color: var(--yellow); background: var(--panel); }
  #modal .newdir-row { display: flex; gap: 6px; margin-bottom: 8px; }
  #modal .newdir-row input { flex: 1; min-width: 0; }
  #modal .newdir-row .btn { padding: 6px 12px; }
  #modal .m-option.dir::before { content: "📁 "; }
  #modal .m-option.up::before { content: "⬆️ "; }
  #modal .m-option.homeDir::before { content: "🏠 "; }
  #modal .m-actions {
    display: flex; gap: 8px; justify-content: flex-end;
    padding: 10px 16px 14px;
  }
  #modal .m-actions .chip { font-size: 13px; padding: 6px 14px; }
  #modal.wide { max-width: 760px; }

  /* ---------- conversation tree ---------- */
  .tree ul { list-style: none; margin: 0; padding-left: 18px; border-left: 1px solid var(--border); }
  .tree > ul { padding-left: 0; border-left: none; }
  .tree li { margin: 3px 0; position: relative; }
  .tree li::before {
    content: ""; position: absolute; top: 11px; left: -18px; width: 14px;
    border-top: 1px solid var(--border);
  }
  .tree > ul > li::before { display: none; }
  .t-node {
    display: inline-flex; align-items: baseline; gap: 6px; max-width: 100%;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 3px 9px;
    font-size: 12.5px;
    cursor: default;
  }
  .t-node .t-label {
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    max-width: 420px;
  }
  .t-node .t-time { color: var(--muted); font-size: 10.5px; flex-shrink: 0; }
  .t-node.user { border-color: var(--accent-dim); background: var(--user-bubble); }
  .t-node.assistant {}
  .t-node.meta { color: var(--muted); font-style: italic; border-style: dashed; }
  .t-node.branch { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
  .t-node .t-badge { font-size: 10px; padding: 0 5px; border-radius: 6px; background: var(--accent-dim); flex-shrink: 0; }
  .t-node.user .t-badge { background: var(--accent-dim); }

  /* ---------- session search ---------- */
  .search-row { display: flex; gap: 6px; margin-bottom: 8px; }
  .search-row input[type=text] { flex: 1; min-width: 0; }
  .search-row select {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font: inherit;
    font-size: 13px;
    padding: 6px 8px;
    max-width: 46%;
  }
  .search-hit .s-snippet {
    color: var(--muted); font-size: 12.5px; margin-top: 2px;
    overflow: hidden; display: -webkit-box;
    -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    word-break: break-word;
  }
  .search-hit .s-snippet mark {
    background: var(--accent-dim); color: var(--text);
    border-radius: 3px; padding: 0 1px;
  }
  .search-hit .s-role {
    font-size: 10px; padding: 0 5px; border-radius: 6px;
    background: var(--accent-dim); flex-shrink: 0;
  }
  .search-hit .s-snippet:hover mark { outline: 1px solid var(--accent); }
  .msg-flash {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
    border-radius: 8px;
    transition: outline-color 1.2s ease-in;
  }
  .msg-flash.fading { outline-color: transparent; }

  /* toast */
  #toasts {
    position: fixed;
    bottom: 90px; left: 50%; transform: translateX(-50%);
    display: flex; flex-direction: column; gap: 6px;
    z-index: 60;
    align-items: center;
    pointer-events: none;
  }
  .toast {
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 13px;
    box-shadow: 0 4px 20px rgba(0,0,0,.4);
    animation: fadein .2s;
    pointer-events: auto;
    touch-action: pan-y;
  }
  .toast.dismissing { transition: transform .15s ease-out, opacity .15s ease-out; opacity: 0; }
  .toast.warning { border-color: var(--yellow); }
  .toast.error { border-color: var(--red); }
  @keyframes fadein { from { opacity: 0; transform: translateY(6px); } }

  /* token gate */
  #gate {
    position: fixed; inset: 0;
    background: var(--bg);
    display: none;
    align-items: center; justify-content: center;
    z-index: 100;
    padding: 20px;
  }
  #gate.open { display: flex; }
  #gate .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 26px;
    max-width: 380px; width: 100%;
    display: flex; flex-direction: column; gap: 12px;
  }
  #gate input {
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 8px;

  }
</style>
</head>
<body>

<div id="menu">
  <button data-action="newSession">New session</button>

<div id="main">
  <div id="chatcol">
    <div id="scroller"><div id="messages"></div></div>

    <div id="composer">
      <div class="inner">
        <button id="attachBtn" title="Attach a server file path">📎</button>
        <textarea id="input" rows="1" placeholder="message pi"></textarea>
        <button class="btn" id="sendBtn">Send</button>
        <button class="btn stop" id="stopBtn" hidden>Stop</button>
      </div>

        <span id="usageInfo"></span>
      </div>
    </div>

  <aside id="ifaces">
    <div id="ifaceList" style="display:contents"></div>

  </aside>
</div>

  <div class="m-title" id="mTitle"></div>
  <div class="m-body" id="mBody"></div>
  <div class="m-actions" id="mActions"></div>
</div></div>

<div id="toasts"></div>

<div id="gate"><div class="card">
  <div style="font-weight:600;font-size:17px">pi remote</div>
  <div style="color:var(--muted);font-size:13.5px">Enter the auth token printed by the server on startup.</div>
  <input type="password" id="gateInput" placeholder="token">
  <button class="btn" id="gateBtn">Connect</button>
</div></div>

<script>
"use strict";

// ------------------------------------------------------------ token

let token = null;
{
  const hash = new URLSearchParams(location.hash.slice(1));
  const query = new URLSearchParams(location.search);
  const fromUrl = hash.get("token") || query.get("token");
  if (fromUrl) {
    localStorage.setItem("pi_ui_token", fromUrl.trim());
    history.replaceState(null, "", location.pathname);
  }
  token = (localStorage.getItem("pi_ui_token") || "").trim() || null;
  // also carry the token as a cookie: cookies survive proxies that strip
  // Authorization/custom headers, and EventSource can't send headers at all
  if (token) {
    document.cookie = `pi_ui_token=${encodeURIComponent(token)}; path=/; max-age=31536000; samesite=strict`;
  }
}

const $ = (id) => document.getElementById(id);
const gate = $("gate");

function requireToken() {
  gate.classList.add("open");
  $("gateInput").focus();
}

// SSE failures: distinguish "server unreachable" from "token rejected".
// Only the server itself saying the token is invalid clears it.
let lastProbeAt = 0;
async function probeTokenValidity() {
  const now = Date.now();
  if (now - lastProbeAt < 10000 || !token) return;
  lastProbeAt = now;
  try {
    const res = await fetch(`/authcheck?token=${encodeURIComponent(token)}`);
    if (!res.ok) return; // server not healthy — treat as network issue
    const data = await res.json();
    if (data.authorized === false) {
      localStorage.removeItem("pi_ui_token");
      document.cookie = "pi_ui_token=; path=/; max-age=0";
      $("stateInfo").textContent = "invalid token";
      requireToken();
    }
  } catch {
    // network error — keep retrying silently
  }
}

// Only drop the stored token if the server itself rejects it via the query-param
// path — a stripped header or transient proxy error must not log the user out.
let verifyingToken = false;
async function handleUnauthorized() {
  if (verifyingToken) return;
  verifyingToken = true;
  try {
    const res = await fetch(`/rpc?token=${encodeURIComponent(token)}`, {
      method: "POST",
      headers: { "content-type": "application/json" },
      body: JSON.stringify({ type: "get_state" }),
    });
    if (res.status === 401) {
      localStorage.removeItem("pi_ui_token");
      document.cookie = "pi_ui_token=; path=/; max-age=0";
      requireToken();
    } else {
      toast("temporary auth hiccup — retry", "warning");
    }
  } catch {
    toast("network error — retry", "warning");
  } finally {
    verifyingToken = false;
  }
}
$("gateBtn").addEventListener("click", () => {
  const v = $("gateInput").value.trim();
  if (!v) return;
  localStorage.setItem("pi_ui_token", v);
  location.reload();
});
$("gateInput").addEventListener("keydown", (e) => {
  if (e.key === "Enter") $("gateBtn").click();
});

// ------------------------------------------------------------ rpc plumbing

const clientId = Math.random().toString(36).slice(2, 8);
let cmdSeq = 0;
const pending = new Map(); // id -> {resolve, reject}

async function rpc(cmd, { wait = true } = {}) {
  const id = `${clientId}-${++cmdSeq}`;
  cmd = { id, ...cmd };
  let waiter = null;
  if (wait) {
    waiter = new Promise((resolve, reject) => {
      pending.set(id, { resolve, reject });
      setTimeout(() => {
        if (pending.has(id)) {
          pending.delete(id);
          reject(new Error(`timeout waiting for ${cmd.type}`));
        }
      }, 60000);
    });
  }
  // token goes in the query string + x-auth-token header: some tunnels/proxies
  // strip or overwrite the Authorization header, which showed up as 401s
  const res = await fetch(`/rpc?token=${encodeURIComponent(token)}&runner=${encodeURIComponent(currentRunner ?? "")}`, {
    method: "POST",
    headers: { "content-type": "application/json", "x-auth-token": token },
    body: JSON.stringify(cmd),
  });
  if (res.status === 401) { handleUnauthorized(); throw new Error("unauthorized"); }
  if (!res.ok) throw new Error(`rpc failed: ${res.status}`);
  return wait ? waiter : null;
}

function handleResponse(msg) {
  const p = pending.get(msg.id);
  if (!p) return;
  pending.delete(msg.id);
  if (msg.success) p.resolve(msg.data);
  else p.reject(new Error(msg.error || "command failed"));
}

// ------------------------------------------------------------ markdown (small, escape-first)

function escapeHtml(s) {
  return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
}

// ------------------------------------------------------------ syntax highlighting
// Tokenizes raw source, escapes each piece, wraps tokens in .tok-* spans.

const KEYWORDS = {
  js: "const let var function return if else for while do switch case break continue new class extends implements interface import export from default async await try catch finally throw typeof instanceof in of delete void yield static super this enum type namespace declare readonly public private protected abstract satisfies as keyof infer",
  py: "def return if elif else for while in not and or import from as class try except finally with lambda yield global nonlocal pass break continue raise assert del is async await match case print",
  sh: "if then else elif fi for while until do done case esac function in select echo exit return local export declare source alias set unset shift trap read printf cd test sudo",
  go: "func return if else for range switch case default break continue goto package import type struct interface map chan go defer select const var fallthrough nil make new len cap append",
  rust: "fn let mut return if else for while loop match impl struct enum trait use mod pub crate super const static ref move async await dyn box where unsafe extern type as in break continue",
  sql: "select from where insert update delete into values join left right inner outer full cross on group by order limit offset having as and or not null create table view index drop alter add primary foreign key references union all distinct case when then else end exists between like is in",
  c: "if else for while do switch case break continue return goto struct union enum typedef sizeof static extern const volatile inline void int char float double long short unsigned signed bool auto class public private protected virtual template typename namespace using new delete this nullptr try catch throw final override",
};
for (const [alias, base] of Object.entries({
  ts: "js", jsx: "js", tsx: "js", javascript: "js", typescript: "js", json: "js", solidity: "js", java: "c",
  python: "py", bash: "sh", shell: "sh", zsh: "sh", sh: "sh", console: "sh", golang: "go",
  cpp: "c", cc: "c", h: "c", hpp: "c", cs: "c", kotlin: "c", swift: "c",
})) KEYWORDS[alias] = KEYWORDS[base];

const LITERALS = new Set("true false null undefined None True False nil NULL Some Ok Err self".split(" "));

function highlightCode(src, lang) {
  lang = (lang || "").toLowerCase();
  const kwSet = new Set((KEYWORDS[lang] ?? KEYWORDS.js).split(" "));
  const hashComments = ["py", "python", "sh", "bash", "shell", "zsh", "console", "yaml", "yml", "toml", "rb", "ruby", "dockerfile", "makefile", ""].includes(lang);
  const dashComments = ["sql", "lua", "hs", "haskell"].includes(lang);
  const slashComments = !["py", "python", "yaml", "yml", "toml", "rb", "ruby"].includes(lang);
  const parts = [
    slashComments ? String.raw`\/\*[\s\S]*?\*\/|\/\/[^\n]*` : null,
    hashComments ? String.raw`#[^\n]*` : null,
    dashComments ? String.raw`--[^\n]*` : null,
    String.raw`"""[\s\S]*?"""|'''[\s\S]*?'''`,
    String.raw`"(?:\\.|[^"\\\n])*"`,
    String.raw`'(?:\\.|[^'\\\n])*'`,
    "`(?:\\\\.|[^`\\\\])*`",
    String.raw`\b0[xX][0-9a-fA-F_]+n?\b`,
    String.raw`\b\d[\d_]*(?:\.\d[\d_]*)?(?:[eE][+-]?\d+)?\w*`,
    String.raw`[A-Za-z_$][A-Za-z0-9_$]*`,
  ].filter(Boolean);
  const re = new RegExp(parts.join("|"), "g");
  let out = "", pos = 0, m;
  while ((m = re.exec(src))) {
    out += escapeHtml(src.slice(pos, m.index));
    const t = m[0];
    const c0 = t[0];
    let cls = null;
    if ((c0 === "/" && (t[1] === "/" || t[1] === "*")) || c0 === "#" || (c0 === "-" && t[1] === "-")) cls = "com";
    else if (c0 === '"' || c0 === "'" || c0 === "`") cls = "str";
    else if (c0 >= "0" && c0 <= "9") cls = "num";
    else if (c0 === "$") cls = "var";
    else if (kwSet.has(t)) cls = "kw";
    else if (LITERALS.has(t)) cls = "lit";
    else {
      let j = m.index + t.length;
      while (src[j] === " ") j++;
      if (src[j] === "(") cls = "fn";
    }
    out += cls ? `<span class="tok-${cls}">${escapeHtml(t)}</span>` : escapeHtml(t);
    pos = m.index + t.length;
  }
  return out + escapeHtml(src.slice(pos));
}

function inlineMd(s) {
  // s is already HTML-escaped
  return s
    .replace(/`([^`]+)`/g, (_, c) => `<code>${c}</code>`)
    .replace(/\*\*\*([^*]+)\*\*\*/g, "<strong><em>$1</em></strong>")
    .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
    .replace(/(^|[\s(])\*([^*\s][^*]*)\*/g, "$1<em>$2</em>")
    .replace(/(^|[\s(])_([^_\s][^_]*)_/g, "$1<em>$2</em>")
    .replace(/\[([^\]]+)\]\((https?:[^)\s]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>')
    .replace(/(^|[\s(])(https?:\/\/[^\s<)]+)/g, '$1<a href="$2" target="_blank" rel="noopener">$2</a>');
}

function renderMarkdown(src) {
  const lines = src.split("\n");
  const out = [];
  let i = 0;
  let para = [];
  const flushPara = () => {
    if (para.length) { out.push(`<p>${inlineMd(escapeHtml(para.join("\n"))).replace(/\n/g, "<br>")}</p>`); para = []; }
  };
  while (i < lines.length) {
    const line = lines[i];
    const fence = line.match(/^\s*```(.*)$/);
    if (fence) {
      flushPara();
      const lang = fence[1].trim().split(/\s+/)[0] || "";
      const buf = [];
      i++;
      while (i < lines.length && !/^\s*```\s*$/.test(lines[i])) { buf.push(lines[i]); i++; }
      i++; // skip closing fence
      const label = lang ? `<div class="code-lang">${escapeHtml(lang)}</div>` : "";
      out.push(`<div class="codeblock">${label}<pre><code>${highlightCode(buf.join("\n"), lang)}</code></pre></div>`);
      continue;
    }
    const h = line.match(/^(#{1,4})\s+(.*)$/);
    if (h) { flushPara(); out.push(`<h${h[1].length}>${inlineMd(escapeHtml(h[2]))}</h${h[1].length}>`); i++; continue; }
    if (/^\s*(-{3,}|\*{3,})\s*$/.test(line)) { flushPara(); out.push("<hr>"); i++; continue; }
    if (/^\s*>/.test(line)) {
      flushPara();
      const buf = [];
      while (i < lines.length && /^\s*>/.test(lines[i])) { buf.push(lines[i].replace(/^\s*>\s?/, "")); i++; }
      out.push(`<blockquote>${inlineMd(escapeHtml(buf.join("\n"))).replace(/\n/g, "<br>")}</blockquote>`);
      continue;
    }
    const ul = line.match(/^(\s*)([-*+])\s+(.*)$/);
    const ol = line.match(/^(\s*)(\d+)[.)]\s+(.*)$/);
    if (ul || ol) {
      flushPara();
      const ordered = !!ol;
      const items = [];
      const re = ordered ? /^(\s*)(\d+)[.)]\s+(.*)$/ : /^(\s*)([-*+])\s+(.*)$/;
      while (i < lines.length) {
        const m = lines[i].match(re);
        if (m) { items.push(m[3]); i++; }
        else if (/^\s{2,}\S/.test(lines[i]) && items.length) { items[items.length - 1] += "\n" + lines[i].trim(); i++; }
        else break;
      }
      const tag = ordered ? "ol" : "ul";
      out.push(`<${tag}>${items.map((it) => `<li>${inlineMd(escapeHtml(it)).replace(/\n/g, "<br>")}</li>`).join("")}</${tag}>`);
      continue;
    }
    if (/^\s*\|.*\|\s*$/.test(line) && i + 1 < lines.length && /^\s*\|[\s:|-]+\|\s*$/.test(lines[i + 1])) {
      flushPara();
      const rows = [];
      while (i < lines.length && /^\s*\|.*\|\s*$/.test(lines[i])) { rows.push(lines[i]); i++; }
      const cells = (r) => r.trim().replace(/^\||\|$/g, "").split("|").map((c) => inlineMd(escapeHtml(c.trim())));
      const head = cells(rows[0]);
      const body = rows.slice(2).map(cells);
      out.push(`<table><thead><tr>${head.map((c) => `<th>${c}</th>`).join("")}</tr></thead><tbody>${body.map((r) => `<tr>${r.map((c) => `<td>${c}</td>`).join("")}</tr>`).join("")}</tbody></table>`);
      continue;
    }
    if (/^\s*$/.test(line)) { flushPara(); i++; continue; }
    para.push(line);
    i++;
  }
  flushPara();
  return out.join("");
}

// ------------------------------------------------------------ message rendering

const messagesEl = $("messages");
const scroller = $("scroller");

function nearBottom() {
  return scroller.scrollHeight - scroller.scrollTop - scroller.clientHeight < 120;
}
function scrollToBottom(force) {
  if (force || nearBottom()) scroller.scrollTop = scroller.scrollHeight;
}

const toolCards = new Map(); // toolCallId -> {el, argsEl, resultEl, statusEl}

function summarizeArgs(name, args) {
  if (!args || typeof args !== "object") return "";
  if (typeof args.command === "string") return args.command;
  if (typeof args.path === "string") return args.path;
  if (typeof args.file_path === "string") return args.file_path;
  const first = Object.values(args).find((v) => typeof v === "string");
  return first || "";
}

function createToolCard(tc) {
  const details = document.createElement("details");
  details.className = "block tool";
  const argSummary = summarizeArgs(tc.name, tc.arguments);
  details.innerHTML =
    `<summary><span class="tname">${escapeHtml(tc.name)}</span>` +
    `<span class="targ">${escapeHtml(argSummary)}</span>` +
    `<span class="status running">⏳</span></summary>` +
    `<div class="body"><pre class="args-pre"></pre><pre class="result-pre"></pre></div>`;
  const card = {
    el: details,
    argsEl: details.querySelector(".args-pre"),
    resultEl: details.querySelector(".result-pre"),
    statusEl: details.querySelector(".status"),
    summaryArgEl: details.querySelector(".targ"),
  };
  renderToolArgs(card, tc);
  toolCards.set(tc.id, card);
  return details;
}

function updateToolCard(tc) {
  const card = toolCards.get(tc.id);
  if (!card) return;
  card.summaryArgEl.textContent = summarizeArgs(tc.name, tc.arguments);
  renderToolArgs(card, tc);
}

function renderToolArgs(card, tc) {
  const args = tc.arguments;
  const name = (tc.name || "").toLowerCase();
  if (name === "edit" && args && Array.isArray(args.edits)) {
    card.argsEl.textContent = "";
    let diff = card.el.querySelector(".diff");
    if (!diff) {
      diff = document.createElement("div");
      diff.className = "diff";
      card.argsEl.after(diff);
    }
    let html = "";
    args.edits.forEach((e, i) => {
      if (args.edits.length > 1) html += `<div class="diff-line diff-hdr">edit ${i + 1}:</div>`;
      for (const line of String(e.oldText ?? "").split("\n"))
        html += `<div class="diff-line diff-del">- ${escapeHtml(line)}</div>`;
      for (const line of String(e.newText ?? "").split("\n"))
        html += `<div class="diff-line diff-add">+ ${escapeHtml(line)}</div>`;
    });
    diff.innerHTML = html;
    return;
  }
  card.argsEl.textContent = JSON.stringify(args, null, 2) ?? "";
}

function toolResultText(msg) {
  if (!msg) return "";
  const parts = [];
  const content = msg.content;
  if (typeof content === "string") parts.push(content);
  else if (Array.isArray(content)) {
    for (const c of content) {
      if (c.type === "text") parts.push(c.text);
      else if (c.type === "image") parts.push(`[image ${c.mimeType}]`);
    }
  }
  return parts.join("\n");
}

function finishToolCard(toolCallId, resultMsgOrText, isError) {
  const card = toolCards.get(toolCallId);
  if (!card) return;
  card.statusEl.textContent = isError ? "✗" : "✓";
  card.statusEl.className = `status ${isError ? "err" : "ok"}`;
  const text = typeof resultMsgOrText === "string" ? resultMsgOrText : toolResultText(resultMsgOrText);
  card.resultEl.textContent = text.length > 20000 ? text.slice(0, 20000) + "\n… (truncated)" : text;
}

let liveAssistant = null; // { root, msg }

function renderBlockEl(block) {
  if (block.type === "thinking") {
    const d = document.createElement("details");
    d.className = "block thinking";
    d.innerHTML = `<summary>thinking</summary><div class="body"></div>`;
    d.querySelector(".body").textContent = block.thinking || "";
    return d;
  }
  if (block.type === "text") {
    const div = document.createElement("div");
    div.className = "md";
    div.innerHTML = renderMarkdown(block.text || "");
    return div;
  }
  return null;
}

/**
 * Incremental render: reuse the existing element for every block whose content
 * hasn't changed since the last update. During streaming only the growing
 * block is re-rendered, which avoids flicker, keeps scroll positions inside
 * code/tool output, and preserves the open state of thinking blocks.
 */
function renderAssistantInto(root, message) {
  const blocks = message.content || [];
  const prevKeys = root._blockKeys || [];
  const prevEls = Array.from(root.children);
  const els = [], keys = [];
  for (let i = 0; i < blocks.length; i++) {
    const block = blocks[i];
    const key = block.type + ":" + JSON.stringify(block);
    if (prevKeys[i] === key && prevEls[i]) { els.push(prevEls[i]); keys.push(key); continue; }
    let el;
    if (block.type === "toolCall") {
      const existing = toolCards.get(block.id);
      if (existing) { updateToolCard(block); el = existing.el; }
      else el = createToolCard(block);
    } else {
      el = renderBlockEl(block);
      // a re-rendered details at the same position keeps its open state
      if (el?.tagName === "DETAILS" && prevEls[i]?.tagName === "DETAILS" && prevEls[i].open) el.open = true;
    }
    if (!el) continue;
    els.push(el);
    keys.push(key);
  }
  if (message.stopReason === "error" && message.errorMessage) {
    const div = document.createElement("div");
    div.className = "msg error-msg";
    div.textContent = message.errorMessage;
    els.push(div);
    keys.push("err:" + message.errorMessage);
  }
  root._blockKeys = keys;
  root.replaceChildren(...els);
}

function userText(message) {
  if (typeof message.content === "string") return message.content;
  if (Array.isArray(message.content)) {
    return message.content.map((c) => (c.type === "text" ? c.text : `[${c.type}]`)).join("\n");
  }
  return "";
}

function addUserMessage(message) {
  const text = userText(message);
  // interface briefings are rendered collapsed, like a tool call
  const iface = text.match(/^Opening interface: (.*)\n/);
  if (iface) {
    const details = document.createElement("details");
    details.className = "block tool";
    details.innerHTML =
      `<summary><span class="tname">opening interface</span>` +
      `<span class="targ"></span></summary>` +
      `<div class="body"><pre></pre></div>`;
    details.querySelector(".targ").textContent = iface[1];
    details.querySelector("pre").textContent = text.slice(iface[0].length);
    messagesEl.appendChild(details);
    scrollToBottom(true);
    return;
  }
  const div = document.createElement("div");
  div.className = "msg user";
  div.textContent = text;
  messagesEl.appendChild(div);
  scrollToBottom(true);
}

// Texts we already rendered locally on send; pi echoes each prompt back as a
// user message_start, which must not be rendered a second time.
const localEchoes = [];

function addAssistantContainer() {
  const div = document.createElement("div");
  div.className = "msg assistant";
  messagesEl.appendChild(div);
  return div;
}

function renderFullMessage(message) {
  const role = message.role;
  if (role === "user") { addUserMessage(message); return; }
  if (role === "assistant") {
    const root = addAssistantContainer();
    renderAssistantInto(root, message);
    return;
  }
  if (role === "toolResult") {
    if (toolCards.has(message.toolCallId)) {
      finishToolCard(message.toolCallId, message, message.isError);
    }
    return;
  }
  // custom messages (extensions etc.) — show generically if they carry text
  if (message.content) {
    const text = toolResultText(message);
    if (text) {
      const root = addAssistantContainer();
      root.innerHTML = `<div class="md">${renderMarkdown(text)}</div>`;
    }
  }
}

function clearMessages() {
  messagesEl.innerHTML = "";
  toolCards.clear();
  liveAssistant = null;
}

// ------------------------------------------------------------ state / header

let state = null;

function fmtCost(n) { return n >= 0.01 ? `$${n.toFixed(2)}` : n > 0 ? `$${n.toFixed(4)}` : "$0"; }

function applyState(s) {
  const sessionChanged = s?.sessionId !== state?.sessionId;
  state = s;
  if (sessionChanged) loadInterfaces(); // sidebar tunnels are session-scoped
  $("sessionTitle").textContent = s.sessionName || "pi remote";
  $("modelChip").textContent = s.model ? s.model.id : "no model";
  $("thinkChip").textContent = `think: ${s.thinkingLevel}`;
  $("cfgChip").textContent = `${s.model ? s.model.id : "no model"} · ${s.thinkingLevel}`;
  setBusy(s.isStreaming || s.isCompacting);
  $("stateInfo").textContent =
    `${s.model ? s.model.provider : "?"} · ${s.messageCount} msgs` +
    (s.pendingMessageCount ? ` · ${s.pendingMessageCount} queued` : "");
}

let workdir = null;

// ------------------------------------------------------------ runners
// The server keeps one pi process ("runner") per open session; this client
// is attached to exactly one at a time. Other runners keep working in the
// background.

let currentRunner = localStorage.getItem("pi_runner") || null;
let runnersNow = []; // latest known runner list (for session indicators)
/** one-shot callback run after the next transcript reload (e.g. focus a search hit) */
let afterTranscript = null;

function setRunner(id) {
  currentRunner = id || null;
  if (id) localStorage.setItem("pi_runner", id);
  else localStorage.removeItem("pi_runner");
}

/** attach this client to another runner and rebuild the UI from its stream */
function switchToRunner(id) {
  if (id === currentRunner) { refreshState(); return; }
  setRunner(id);
  clearMessages();
  knownCommands = null; // commands can differ per project
  connect(); // reopen SSE on the new runner; onopen reloads the transcript
}

/** get-or-spawn a runner for a session file / folder */
async function openSessionRunner({ sessionPath = null, dir = null } = {}) {
  const res = await fetch(`/open-session?token=${encodeURIComponent(token)}`, {
    method: "POST",
    headers: { "content-type": "application/json" },
    body: JSON.stringify({ sessionPath, dir }),
  });
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.error || `open-session failed (${res.status})`);
  return data.runner;
}

/** hook: session picker (when open) re-renders its indicators */
let onRunnersUpdate = null;

function setWorkdir(dir) {
  workdir = dir;
  const el = $("workdirInfo");
  el.textContent = dir ? `📁 ${dir.length > 40 ? "…" + dir.slice(-39) : dir}` : "";
  el.title = dir || "";
}

let busy = false;
function setBusy(b) {
  busy = b;
  const dot = $("connDot");
  if (connected) dot.className = "dot " + (b ? "busy" : "ok");
  const hasText = !!$("input").value.trim();
  $("sendBtn").textContent = b ? "Steer" : "Send";
  $("sendBtn").hidden = b && !hasText;
  $("stopBtn").hidden = !b;
}

function updateUsage(message) {
  const u = message?.usage;
  if (!u) return;
  $("usageInfo").textContent =
    `↑${u.input.toLocaleString()} ↓${u.output.toLocaleString()} tok · ${fmtCost(u.cost?.total ?? 0)}`;
}

// ------------------------------------------------------------ event stream

let connected = false;
let es = null;

// Watchdog: the server sends a ping event every 25s. Through a tunnel, a
// connection can die without the browser noticing (EventSource stays OPEN
// forever on a half-dead socket) — if nothing arrives for 70s, force a
// reconnect.
let lastEventAt = Date.now();
setInterval(() => {
  if (es && Date.now() - lastEventAt > 70000) {
    es.close();
    connected = false;
    $("connDot").className = "dot";
    $("stateInfo").textContent = "connection lost — reconnecting…";
    connect();
  }
}, 15000);

function connect() {
  if (!token) { requireToken(); return; }
  if (es) { try { es.close(); } catch {} }
  lastEventAt = Date.now();
  replaying = true;
  es = new EventSource(`/events?token=${encodeURIComponent(token)}&runner=${encodeURIComponent(currentRunner ?? "")}`);
  es.onopen = async () => {
    connected = true;
    $("connDot").className = "dot ok";
    $("stateInfo").textContent = "connected";
    try {
      // Always rebuild from the canonical transcript: the SSE replay buffer
      // re-delivers recent events on reconnect, so rendering them onto the
      // existing DOM would duplicate messages.
      await reloadTranscript();
    } catch (e) {
      if (String(e.message).includes("unauthorized")) return;
      toast(`init failed: ${e.message}`, "error");
    }
  };
  es.onerror = () => {
    connected = false;
    $("connDot").className = "dot";
    $("stateInfo").textContent = "reconnecting…";
    // EventSource can't see HTTP status codes, so a 401 (bad stored token)
    // looks identical to a network blip and would retry forever. Probe
    // /authcheck to tell them apart, at most once per 10s.
    probeTokenValidity();
  };
  es.onmessage = (ev) => {
    lastEventAt = Date.now();
    let msg;
    try { msg = JSON.parse(ev.data); } catch { return; }
    try { handleEvent(msg); } catch (e) {
      console.error("event handling failed", e, msg);
    }
  };
}

let replaying = true; // true while the SSE replay buffer is being re-delivered

function handleEvent(msg) {
  // While the SSE replay buffer is being re-delivered, drop transcript-
  // rendering events: reloadTranscript() rebuilds the canonical state, so
  // rendering replayed copies would duplicate messages/tool cards.
  if (replaying && ["message_start", "message_update", "message_end",
       "tool_execution_start", "tool_execution_update", "tool_execution_end",
       "agent_start", "agent_end"].includes(msg.type)) {
    return;
  }
  switch (msg.type) {
    case "ping":
      return;

    case "replay_done":
      replaying = false;
      if (msg.runner) setRunner(msg.runner); // server may have fallen back to another runner
      if (msg.runners) runnersNow = msg.runners;
      if (msg.workdir) setWorkdir(msg.workdir);
      loadInterfaces();
      return;

    case "runners_update":
      runnersNow = msg.runners ?? [];
      onRunnersUpdate?.(runnersNow);
      return;

    case "response":
      handleResponse(msg);
      // state changes often follow commands; refresh cheaply
      if (["set_model", "set_thinking_level", "cycle_thinking_level", "new_session",
           "switch_session", "compact", "set_session_name"].includes(msg.command)) {
        refreshState();
      }
      return;

    case "agent_start":
      setBusy(true);
      return;

    case "agent_end":
      setBusy(false);
      liveAssistant = null;
      refreshState();
      return;

    case "message_start": {
      const m = msg.message;
      if (m.role === "assistant") {
        liveAssistant = { root: addAssistantContainer(), msg: m };
        renderAssistantInto(liveAssistant.root, m);
        scrollToBottom(true);
      } else if (m.role === "user") {
        const idx = localEchoes.indexOf(userText(m));
        if (idx !== -1) localEchoes.splice(idx, 1); // already rendered on send
        else addUserMessage(m);
      }
      return;
    }

    case "message_update": {
      const m = msg.message;
      if (m.role === "assistant") {
        if (!liveAssistant) liveAssistant = { root: addAssistantContainer(), msg: m };
        renderAssistantInto(liveAssistant.root, m);
        scrollToBottom(false);
      }
      return;
    }

    case "message_end": {
      const m = msg.message;
      if (m.role === "assistant") {
        if (liveAssistant) { renderAssistantInto(liveAssistant.root, m); liveAssistant = null; }
        else { const root = addAssistantContainer(); renderAssistantInto(root, m); }
        updateUsage(m);
      } else if (m.role === "toolResult") {
        finishToolCard(m.toolCallId, m, m.isError);
      }
      scrollToBottom(false);
      return;
    }

    case "tool_execution_start": {
      const card = toolCards.get(msg.toolCallId);
      if (card) { card.statusEl.textContent = "⏳"; card.statusEl.className = "status running"; }
      return;
    }

    case "tool_execution_update": {
      const card = toolCards.get(msg.toolCallId);
      if (card && msg.partialResult) {
        const text = typeof msg.partialResult === "string"
          ? msg.partialResult
          : toolResultText(msg.partialResult) || JSON.stringify(msg.partialResult);
        card.resultEl.textContent = text.slice(-20000);
      }
      return;
    }

    case "tool_execution_end":
      finishToolCard(
        msg.toolCallId,
        typeof msg.result === "string" ? msg.result : toolResultText(msg.result) || JSON.stringify(msg.result, null, 2),
        msg.isError
      );
      scrollToBottom(false);
      return;

    case "extension_ui_request":
      handleExtensionUI(msg);
      return;

    case "pi_exit":
      // replayed copies describe past restarts, not the current process
      if (replaying) return;
      toast("pi process exited — it will restart on next message", "warning");
      setBusy(false);
      return;

    case "pi_started":
      if (replaying) return;
      if (msg.startCount > 1) {
        toast("pi process restarted");
        refreshState();
      }
      return;

    case "pi_error":
      if (replaying) return;
      toast(`pi spawn error: ${msg.error}`, "error");
      return;

    case "ui_reload":
      // the page on disk changed; offer a refresh. Ignore replayed copies of
      // this event — after a refresh we already run the newest version.
      if (replaying) return;
      toast("UI updated — tap to refresh", "warning", { onClick: () => location.reload(), sticky: true });
      return;

    case "code_reloaded":
      if (!replaying) toast("server code hot-reloaded");
      return;

    case "code_reload_failed":
      if (!replaying) toast(`server reload failed: ${msg.error}`, "error");
      return;

    case "tunnel_opened":
      if (!replaying) {
        toast(`interface up: ${msg.tunnel?.url} → :${msg.tunnel?.port}`, "info", {
          onClick: () => window.open(msg.tunnel?.url, "_blank"),
        });
        loadInterfaces();
      }
      return;

    case "interface_ready":
      if (!replaying) {
        toast(`interface ready: ${msg.tunnel?.url}`, "info", {
          onClick: () => window.open(msg.tunnel?.url, "_blank"),
        });
        // rebuild previews now, then again shortly after: recreating the
        // iframe is the only way to reload a possibly-captured error page,
        // and the edge can lag a moment behind the ready signal
        loadInterfaces();
        setTimeout(loadInterfaces, 5000);
        setTimeout(loadInterfaces, 15000);
      }
      return;

    case "interface_failed":
      if (!replaying) toast(`interface failed: ${msg.error ?? "unknown error"}`, "error");
      return;

    case "tunnel_closed":
      if (!replaying) {
        toast(`interface closed: :${msg.tunnel?.port}`, "warning");
        loadInterfaces();
      }
      return;
  }
}

async function reloadTranscript() {
  const s = await rpc({ type: "get_state" });
  applyState(s);
  const { messages } = await rpc({ type: "get_messages" });
  clearMessages();
  for (const m of messages) renderFullMessage(m);
  scrollToBottom(true);
  const cb = afterTranscript;
  afterTranscript = null;
  cb?.();
}

let stateRefreshTimer = null;
function refreshState() {
  clearTimeout(stateRefreshTimer);
  stateRefreshTimer = setTimeout(async () => {
    try { applyState(await rpc({ type: "get_state" })); } catch {}
  }, 150);
}

// ------------------------------------------------------------ composer

const input = $("input");
const sendBtn = $("sendBtn");

input.addEventListener("input", () => {
  input.style.height = "auto";
  input.style.height = Math.min(input.scrollHeight, 200) + "px";
  setBusy(busy); // refresh busy state UI
});

input.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey && !e.isComposing) {
    e.preventDefault();
    send();
  }
});

sendBtn.addEventListener("click", () => send());
$("stopBtn").addEventListener("click", () => abort());

// pi's slash commands (extensions, prompt templates, skills), cached until
// the pi process or folder changes
let knownCommands = null;
async function getKnownCommands() {
  if (knownCommands) return knownCommands;
  try {
    const { commands } = await rpc({ type: "get_commands" });
    knownCommands = new Set(commands.map((c) => c.name));
  } catch {
    knownCommands = null; // retry next time
    return new Set();
  }
  return knownCommands;
}

async function send() {
  const text = input.value.trim();
  if (!text) return;
  // guard against typos like "/goal": an unknown slash command is not
  // expanded by pi — it goes to the model as plain text, which can kick off
  // a long unwanted agent run
  if (text.startsWith("/")) {
    const name = text.slice(1).split(/\s+/)[0];
    if (name) {
      const cmds = await getKnownCommands();
      if (!cmds.has(name)) {
        const proceed = await confirmDialog(
          "Unknown command",
          `"/${name}" is not a pi command. Send it to the model as plain text?`
        );
        if (!proceed) return; // text stays in the composer
      }
    }
  }
  input.value = "";
  input.style.height = "auto";
  setBusy(busy); // hide the Steer button again
  addUserMessage({ role: "user", content: text });
  localEchoes.push(text);
  try {
    await rpc({ type: "prompt", message: text }, { wait: false });
  } catch (e) {
    const idx = localEchoes.indexOf(text);
    if (idx !== -1) localEchoes.splice(idx, 1);
    toast(`send failed: ${e.message}`, "error");
  }
}

async function abort() {
  try { await rpc({ type: "abort" }, { wait: false }); toast("aborted"); }
  catch (e) { toast(`abort failed: ${e.message}`, "error"); }
}

// ------------------------------------------------------------ menu & actions

const menu = $("menu");
$("menuBtn").addEventListener("click", (e) => { e.stopPropagation(); menu.classList.toggle("open"); });
document.addEventListener("click", () => menu.classList.remove("open"));

menu.addEventListener("click", async (e) => {
  const action = e.target.dataset?.action;
  if (!action) return;
  menu.classList.remove("open");
  try {
    if (action === "newSession") {
      // a fresh runner, so the current session keeps running in the background
      const r = await openSessionRunner({ dir: workdir });
      switchToRunner(r.id);
      toast("new session");
    } else if (action === "newSessionIn") {
      await showFolderBrowser();
    } else if (action === "sessions") {
      await showSessionPicker();
    } else if (action === "tree") {
      await showConversationTree();
    } else if (action === "tunnels") {
      await showTunnels();
    } else if (action === "compact") {
      toast("compacting…");
      await rpc({ type: "compact" });
      toast("compacted");
      const { messages } = await rpc({ type: "get_messages" });
      clearMessages();
      for (const m of messages) renderFullMessage(m);
    } else if (action === "restart") {
      await fetch(`/restart?token=${encodeURIComponent(token)}&runner=${encodeURIComponent(currentRunner ?? "")}`, { method: "POST" });
      clearMessages();
    } else if (action === "logout") {
      localStorage.removeItem("pi_ui_token");
      document.cookie = "pi_ui_token=; path=/; max-age=0";
      location.reload();
    }
  } catch (err) {
    toast(err.message, "error");
  }
});

// ------------------------------------------------------------ attach file

function fmtSize(n) {
  if (n == null) return "";
  if (n < 1024) return `${n} B`;
  if (n < 1024 * 1024) return `${(n / 1024).toFixed(1)} KB`;
  return `${(n / 1024 / 1024).toFixed(1)} MB`;
}

/** Browse server files; onPick(path) gets the chosen file. Defaults to
 *  inserting the path into the composer. */
async function showFilePicker(onPick = insertIntoComposer, onCancel = null) {
  const body = $("mBody"), actions = $("mActions");
  let startPath = localStorage.getItem("pi_attach_dir") || workdir;

  async function load(path) {
    const q = path ? `&path=${encodeURIComponent(path)}` : "";
    const res = await fetch(`/browse?token=${encodeURIComponent(token)}&files=1${q}`);
    const data = await res.json();
    if (!res.ok) {
      toast(data.error || "cannot open folder", "error");
      // e.g. remembered folder was deleted — fall back to the workdir
      if (path !== workdir) return load(workdir);
      return;
    }
    localStorage.setItem("pi_attach_dir", data.path);
    $("mTitle").textContent = "Attach file";
    body.innerHTML = "";
    const pathEl = document.createElement("div");
    pathEl.className = "m-path";
    pathEl.textContent = data.path;
    body.appendChild(pathEl);

    const addDir = (label, cls, target) => {
      const b = document.createElement("button");
      b.className = `m-option dir ${cls}`;
      b.textContent = label;
      b.addEventListener("click", () => load(target));
      body.appendChild(b);
    };
    if (data.path !== data.home) addDir("home", "homeDir", data.home);
    if (data.workdir && data.path !== data.workdir) addDir("workdir", "", data.workdir);
    if (data.parent) addDir("..", "up", data.parent);
    for (const name of data.dirs) {
      addDir(name, "", data.path.replace(/\/$/, "") + "/" + name);
    }
    for (const f of data.files ?? []) {
      const b = document.createElement("button");
      b.className = "m-option file";
      b.textContent = f.name;
      const size = document.createElement("span");
      size.className = "f-size";
      size.textContent = fmtSize(f.size);
      b.appendChild(size);
      const full = data.path.replace(/\/$/, "") + "/" + f.name;
      b.title = full;
      b.addEventListener("click", () => {
        closeModal();
        onPick(full);
      });
      body.appendChild(b);
    }
    if (!data.dirs.length && !(data.files ?? []).length) {
      const empty = document.createElement("div");
      empty.className = "m-path";
      empty.textContent = "(empty folder)";
      body.appendChild(empty);
    }
  }

  actions.innerHTML = "";
  const cancel = document.createElement("span");
  cancel.className = "chip";
  cancel.textContent = "Cancel";
  cancel.addEventListener("click", () => { closeModal(); onCancel?.(); });
  actions.appendChild(cancel);
  overlay.classList.add("open");
  await load(startPath);
}

/** Insert text at the cursor position in the composer, padded with spaces. */
function insertIntoComposer(text) {
  const inp = $("input");
  const start = inp.selectionStart ?? inp.value.length;
  const end = inp.selectionEnd ?? start;
  const before = inp.value.slice(0, start);
  const after = inp.value.slice(end);
  const pad = before && !/\s$/.test(before) ? " " : "";
  const padAfter = after && !/^\s/.test(after) ? " " : "";
  inp.value = before + pad + text + padAfter + after;
  const pos = (before + pad + text).length;
  inp.setSelectionRange(pos, pos);
  inp.dispatchEvent(new Event("input")); // resize textarea
  inp.focus();
}

$("attachBtn").addEventListener("click", () => showFilePicker().catch((e) => toast(e.message, "error")));

// ------------------------------------------------------------ folder browser

async function showFolderBrowser() {
  const body = $("mBody"), actions = $("mActions");
  let browsePath = workdir;
  let done = null;
  const finished = new Promise((resolve) => { done = resolve; });

  async function load(path) {
    const q = path ? `&path=${encodeURIComponent(path)}` : "";
    const res = await fetch(`/browse?token=${encodeURIComponent(token)}${q}`);
    const data = await res.json();
    if (!res.ok) { toast(data.error || "cannot open folder", "error"); return; }
    browsePath = data.path;
    $("mTitle").textContent = "New session in folder";
    body.innerHTML = "";
    const pathEl = document.createElement("div");
    pathEl.className = "m-path";
    pathEl.textContent = data.path;
    body.appendChild(pathEl);
    const addEntry = (label, cls, target) => {
      const b = document.createElement("button");
      b.className = `m-option dir ${cls}`;
      b.textContent = label;
      b.addEventListener("click", () => load(target));
      body.appendChild(b);
    };
    if (data.path !== data.home) addEntry("home", "homeDir", data.home);
    if (data.parent) addEntry("..", "up", data.parent);
    for (const name of data.dirs) {
      addEntry(name, "", data.path.replace(/\/$/, "") + "/" + name);
    }
    if (!data.dirs.length) {
      const empty = document.createElement("div");
      empty.className = "m-path";
      empty.textContent = "(no subfolders)";
      body.appendChild(empty);
    }
  }

  function showCreateRow() {
    const existing = body.querySelector(".newdir-row");
    if (existing) { existing.querySelector("input").focus(); return; }
    const row = document.createElement("div");
    row.className = "newdir-row";
    const inp = document.createElement("input");
    inp.type = "text";
    inp.placeholder = "new folder name";
    const create = document.createElement("button");
    create.className = "btn";
    create.textContent = "Create";
    create.addEventListener("click", async () => {
      const name = inp.value.trim();
      if (!name) { inp.focus(); return; }
      create.disabled = true;
      try {
        const res = await fetch(`/mkdir?token=${encodeURIComponent(token)}`, {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ path: browsePath, name }),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) { toast(data.error || `mkdir failed (${res.status})`, "error"); create.disabled = false; return; }
        toast(`created ${data.path}`);
        await load(data.path); // descend into the new folder
      } catch (e) {
        toast(`mkdir failed: ${e.message}`, "error");
        create.disabled = false;
      }
    });
    inp.addEventListener("keydown", (e) => {
      if (e.key === "Enter") create.click();
      else if (e.key === "Escape") row.remove();
    });
    row.append(inp, create);
    // insert right below the path display
    body.insertBefore(row, body.children[1] ?? null);
    inp.focus();
  }

  actions.innerHTML = "";
  const newFolder = document.createElement("span");
  newFolder.className = "chip";
  newFolder.textContent = "New folder";
  newFolder.addEventListener("click", showCreateRow);
  const cancel = document.createElement("span");
  cancel.className = "chip";
  cancel.textContent = "Cancel";
  cancel.addEventListener("click", () => { closeModal(); done(null); });
  const ok = document.createElement("button");
  ok.className = "btn";
  ok.textContent = "Start session here";
  ok.style.padding = "6px 16px";
  ok.addEventListener("click", () => { closeModal(); done(browsePath); });
  actions.append(newFolder, cancel, ok);
  overlay.classList.add("open");
  await load(browsePath);

  const chosen = await finished;
  if (!chosen) return;
  try {
    // spawns a NEW runner in that folder; the current session keeps running
    const r = await openSessionRunner({ dir: chosen });
    setWorkdir(chosen);
    switchToRunner(r.id);
    toast(`folder: ${chosen}`);
  } catch (e) {
    toast(e.message, "error");
  }
}

}

      const full = data.path.replace(/\/$/, "") + "/" + f.name;
      const row = document.createElement("div");
      row.style.cssText = "display:flex;align-items:center;gap:6px;";
      const b = document.createElement("button");
      b.className = "m-option file";
      b.style.cssText = "flex:1;min-width:0;";
      b.textContent = f.name;
      const size = document.createElement("span");
      size.className = "f-size";
      size.textContent = fmtSize(f.size);
      b.appendChild(size);
      b.title = full;
      b.addEventListener("click", () => editFile(full));
      const dl = document.createElement("a");
      dl.className = "chip";
      dl.textContent = "\u2B07";
      dl.title = `download ${f.name}`;
      dl.href = `/file-download?token=${encodeURIComponent(token)}&path=${encodeURIComponent(full)}`;
      dl.setAttribute("download", f.name);
      dl.style.textDecoration = "none";
      const ed = document.createElement("span");
      ed.className = "chip";
      ed.textContent = "\u270E";
      ed.title = `edit ${f.name}`;
      ed.addEventListener("click", () => editFile(full));
      row.append(b, dl, ed);
      body.appendChild(row);
    }
    if (!data.dirs.length && !(data.files ?? []).length) {
      const empty = document.createElement("div");
      empty.className = "m-path";
      empty.textContent = "(empty folder)";
      body.appendChild(empty);
    }

    actions.innerHTML = "";
    const back = document.createElement("span");
    back.className = "chip";
    back.textContent = "\u2190 Interfaces";
    back.addEventListener("click", () => showTunnels().catch((e) => toast(e.message, "error")));
    const closeBtn = document.createElement("span");
    closeBtn.className = "chip";
    closeBtn.textContent = "Close";
    closeBtn.addEventListener("click", closeModal);
    actions.append(back, closeBtn);
  }

  async function editFile(path) {
    const res = await fetch(`/file-content?token=${encodeURIComponent(token)}&path=${encodeURIComponent(path)}`);
    const data = await res.json().catch(() => ({}));
    if (!res.ok) { toast(data.error || "cannot open file", "error"); return; }

    $("mTitle").textContent = `\u270E ${path.split("/").pop()}`;
    body.innerHTML = "";
    const pathEl = document.createElement("div");
    pathEl.className = "m-path";
    pathEl.textContent = path;
    const ta = document.createElement("textarea");
    ta.value = data.content;
    ta.spellcheck = false;
    ta.style.cssText = "width:100%;height:50vh;resize:vertical;font:12.5px/1.5 ui-monospace,monospace;white-space:pre;tab-size:4;box-sizing:border-box;margin-top:6px;";
    body.append(pathEl, ta);

    actions.innerHTML = "";
    const save = document.createElement("span");
    save.className = "chip";
    save.textContent = "Save";
    save.addEventListener("click", async () => {
      save.textContent = "Saving\u2026";
      try {
        const r = await fetch(`/file-save?token=${encodeURIComponent(token)}`, {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ path, content: ta.value }),
        });
        const d = await r.json().catch(() => ({}));
        if (!r.ok) throw new Error(d.error || `save failed (${r.status})`);
        toast(`saved ${path.split("/").pop()} (${d.bytes} bytes)`);
      } catch (e) {
        toast(e.message, "error");
      } finally {
        save.textContent = "Save";
      }
    });
    ta.addEventListener("keydown", (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === "s") { e.preventDefault(); save.click(); }
    });
    const dl = document.createElement("a");
    dl.className = "chip";
    dl.textContent = "Download";
    dl.href = `/file-download?token=${encodeURIComponent(token)}&path=${encodeURIComponent(path)}`;
    dl.setAttribute("download", path.split("/").pop());
    dl.style.textDecoration = "none";
    const back = document.createElement("span");
    back.className = "chip";
    back.textContent = "\u2190 Back";
    back.addEventListener("click", () => load(curPath));
    const closeBtn = document.createElement("span");
    closeBtn.className = "chip";
    closeBtn.textContent = "Close";
    closeBtn.addEventListener("click", closeModal);
    actions.append(save, dl, back, closeBtn);
  }

  overlay.classList.add("open");
  await load(startPath);
}

// Tunnels are bound to the session they were opened in; the modal and the
// interface sidebar show the current session's tunnels by default, with a
// toggle to see every session's.
let tunnelScopeAll = false;

function tunnelVisible(t) {
  // unbound tunnels (opened before session binding existed) stay visible
  return tunnelScopeAll || !t.sessionId || t.sessionId === state?.sessionId;
}

// new-tunnel form values survive modal re-renders (e.g. attach-file detour)
const tunnelForm = { desc: "" };

async function showTunnels() {
  const body = $("mBody"), actions = $("mActions");

  async function load() {
    const res = await fetch(`/tunnels?token=${encodeURIComponent(token)}`);
    const data = await res.json();
    if (!res.ok) { toast(data.error || "failed to load tunnels", "error"); return; }
    const visible = data.tunnels.filter(tunnelVisible);
    $("mTitle").textContent = tunnelScopeAll ? "Interfaces — all sessions" : "Interfaces — this session";
    body.innerHTML = "";

    // ---- built-in interfaces (always on top)
    const fxRow = document.createElement("div");
    fxRow.style.cssText = "display:flex;align-items:center;gap:8px;padding:4px 0 10px;border-bottom:1px solid var(--border,#333);margin-bottom:8px;";
    const fxBtn = document.createElement("button");
    fxBtn.className = "btn";
    fxBtn.textContent = "\u{1F4C1} File explorer";
    const fxDesc = document.createElement("span");
    fxDesc.className = "m-path";
    fxDesc.style.cssText = "flex:1;min-width:0;";
    fxDesc.textContent = "built-in — browse server files, download or edit any of them";
    fxBtn.addEventListener("click", () => showFileExplorer().catch((e) => toast(e.message, "error")));
    fxRow.append(fxBtn, fxDesc);
    body.appendChild(fxRow);

    // ---- active tunnels
    if (!visible.length) {
      const empty = document.createElement("div");
      empty.className = "m-path";
      empty.textContent = tunnelScopeAll
        ? "(no active interfaces)"
        : data.tunnels.length
          ? `(none for this session — ${data.tunnels.length} in other sessions)`
          : "(no active interfaces)";
      body.appendChild(empty);
    }
    if (visible.length) {
      const grid = document.createElement("div");
      grid.className = "iface-grid";
      for (const t of visible) {
        const block = document.createElement("div");
        block.className = "iface-block";

        const preview = document.createElement("div");
        preview.className = "preview";
        const frame = document.createElement("iframe");
        frame.src = t.url;
        frame.loading = "lazy";
        frame.sandbox = "allow-scripts allow-same-origin";
        const hit = document.createElement("div");
        hit.className = "hit";
        hit.title = `open ${t.url}`;
        hit.addEventListener("click", () => window.open(t.url, "_blank", "noopener"));
        preview.append(frame, hit);

        const cap = document.createElement("div");
        cap.className = "cap";
        const lbl = document.createElement("span");
        lbl.className = "lbl";
        const bits = [`:${t.port}`, t.label];
        if (tunnelScopeAll && t.sessionId) {
          bits.push(t.sessionId === state?.sessionId ? "this session" : `session ${String(t.sessionId).slice(0, 8)}`);
        }
        lbl.textContent = bits.filter(Boolean).join(" · ");
        lbl.title = `${t.url}\n${t.label ?? ""}`;
        const x = document.createElement("span");
        x.className = "x";
        x.textContent = "✕";
        x.title = "close this interface";
        x.addEventListener("click", async () => {
          await fetch(`/tunnels?token=${encodeURIComponent(token)}&id=${encodeURIComponent(t.id)}`, { method: "DELETE" });
          await load();
          loadInterfaces();
        });
        cap.append(lbl, x);

        block.append(preview, cap);
        grid.appendChild(block);
      }
      body.appendChild(grid);
    }

    // ---- new tunnel form
    const form = document.createElement("div");
    form.style.cssText = "display:flex;flex-direction:column;gap:8px;margin-top:12px;border-top:1px solid var(--border,#333);padding-top:12px;";
    const heading = document.createElement("div");
    heading.style.cssText = "font-weight:600;font-size:13.5px;";
    heading.textContent = "New interface";
    const descRow = document.createElement("div");
    descRow.style.cssText = "display:flex;gap:6px;align-items:flex-start;";
    const descInp = document.createElement("textarea");
    descInp.rows = 3;
    descInp.placeholder = "What should the agent expose through this interface? (e.g. “the vite dev server for the dashboard, with hot reload”)";
    descInp.style.cssText = "resize:vertical;flex:1;min-width:0;";
    descInp.value = tunnelForm.desc;
    descInp.addEventListener("input", () => { tunnelForm.desc = descInp.value; });
    const attach = document.createElement("button");
    attach.className = "attach-btn";
    attach.textContent = "📎";
    attach.title = "Attach a server file path to the description";
    attach.addEventListener("click", () => {
      // the picker reuses the shared modal, so reopen tunnels after choosing;
      // tunnelForm keeps whatever was already typed
      const reopen = () => showTunnels().catch((e) => toast(e.message, "error"));
      showFilePicker((path) => {
        const pad = tunnelForm.desc && !/\s$/.test(tunnelForm.desc) ? " " : "";
        tunnelForm.desc += pad + path;
        reopen();
      }, reopen).catch((e) => toast(e.message, "error"));
    });
    descRow.append(descInp, attach);
    const create = document.createElement("button");
    create.className = "btn";
    create.textContent = "Open interface";
    create.addEventListener("click", async () => {
      const desc = descInp.value.trim();
      if (!desc) { descInp.focus(); toast("describe what the interface should expose", "warning"); return; }
      create.disabled = true;
      create.textContent = "Opening…";
      try {
        // no port sent: the server allocates the next free one from 3000 up;
        // a `brief` makes the server hand the setup to a background pi agent
        const res2 = await fetch(`/tunnels?token=${encodeURIComponent(token)}`, {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({
            label: desc || null,
            sessionId: state?.sessionId ?? null,
            brief: desc,
          }),
        });
        const d2 = await res2.json().catch(() => ({}));
        if (!res2.ok) { toast(d2.error || `failed (${res2.status})`, "error"); return; }
        tunnelForm.desc = "";
        closeModal();
        toast(`interface opening at ${d2.tunnel.url} — background agent is setting it up…`);
      } catch (e) {
        toast(`interface failed: ${e.message}`, "error");
      } finally {
        create.disabled = false;
        create.textContent = "Open interface";
      }
    });
    form.append(heading, descRow, create);
    body.appendChild(form);

    actions.innerHTML = "";
    const scope = document.createElement("span");
    scope.className = "chip";
    scope.textContent = tunnelScopeAll ? "This session only" : "All sessions";
    scope.title = "toggle between this session's tunnels and all of them";
    scope.addEventListener("click", async () => {
      tunnelScopeAll = !tunnelScopeAll;
      await load();
      loadInterfaces(); // keep the sidebar in the same scope
    });
    const closeBtn = document.createElement("span");
    closeBtn.className = "chip";
    closeBtn.textContent = "Close";
    closeBtn.addEventListener("click", closeModal);
    actions.append(scope, closeBtn);
  }

  $("modal").classList.add("wide");
  overlay.classList.add("open");
  await load();
}
