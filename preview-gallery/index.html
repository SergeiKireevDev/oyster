<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>pi-lot-ui — device previews</title>
<style>
  :root {
    --bg: #0e1116;
    --panel: #161b22;
    --border: #2d333b;
    --text: #e6edf3;
    --dim: #8b949e;
    --accent: #79b8ff;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font: 15px/1.5 system-ui, -apple-system, "Segoe UI", sans-serif;
    padding: 32px 24px 64px;
  }
  header { text-align: center; margin-bottom: 40px; }
  h1 { font-size: 26px; margin: 0 0 6px; }
  header p { color: var(--dim); margin: 0; }
  .grid {
    display: flex;
    flex-wrap: wrap;
    gap: 40px;
    justify-content: center;
    align-items: flex-end;
    max-width: 1500px;
    margin: 0 auto;
  }
  .card { text-align: center; }
  .card .meta { margin-top: 14px; }
  .card .meta .label { font-weight: 600; }
  .card .meta .dims { color: var(--dim); font-size: 13px; }
  .shot-wrap { cursor: zoom-in; display: inline-block; }
  .shot-wrap img { display: block; width: 100%; height: 100%; object-fit: cover; object-position: top; }

  /* ---- device frames ---- */
  .frame-phone {
    padding: 14px 10px;
    background: #1c1f26;
    border: 2px solid #3a4149;
    border-radius: 42px;
    box-shadow: 0 12px 40px rgba(0,0,0,.5);
    position: relative;
  }
  .frame-phone .screen { border-radius: 30px; overflow: hidden; background: #000; position: relative; }
  .frame-phone .island {
    position: absolute; top: 24px; left: 50%; transform: translateX(-50%);
    width: 78px; height: 22px; border-radius: 12px; background: #000; z-index: 2;
    border: 1px solid #111;
  }
  .frame-tablet {
    padding: 22px;
    background: #1c1f26;
    border: 2px solid #3a4149;
    border-radius: 26px;
    box-shadow: 0 12px 40px rgba(0,0,0,.5);
  }
  .frame-tablet .screen { border-radius: 8px; overflow: hidden; background: #000; }
  .frame-desktop {
    background: #1c1f26;
    border: 2px solid #3a4149;
    border-radius: 12px 12px 0 0;
    padding: 8px 8px 0;
    box-shadow: 0 12px 40px rgba(0,0,0,.5);
  }
  .frame-desktop .screen { border-radius: 6px 6px 0 0; overflow: hidden; background: #000; }
  .frame-desktop .chin {
    height: 26px; display: flex; align-items: center; justify-content: center;
    color: #555; font-size: 10px; letter-spacing: 2px;
  }
  .stand { width: 90px; height: 34px; background: linear-gradient(#2a2f36, #1c1f26); margin: 0 auto; clip-path: polygon(20% 0, 80% 0, 100% 100%, 0 100%); }
  .stand-base { width: 150px; height: 8px; background: #2a2f36; border-radius: 4px; margin: 0 auto; }

  /* ---- lightbox ---- */
  #lightbox {
    position: fixed; inset: 0; background: rgba(0,0,0,.88);
    display: none; align-items: center; justify-content: center;
    z-index: 10; cursor: zoom-out; flex-direction: column; gap: 12px;
  }
  #lightbox.open { display: flex; }
  #lightbox img { max-width: 94vw; max-height: 88vh; border: 1px solid var(--border); border-radius: 8px; }
  #lightbox .cap { color: var(--dim); font-size: 14px; }
  footer { text-align: center; color: var(--dim); font-size: 13px; margin-top: 56px; }
  a { color: var(--accent); }
</style>
</head>
<body>
<header>
  <h1>pi-lot-ui — device previews</h1>
  <p>Live captures of the web UI across popular form factors · click any preview to enlarge</p>
</header>

<div class="grid" id="grid"></div>

<div id="lightbox"><img alt=""><div class="cap"></div></div>

<footer>Captured with headless Chromium (Playwright device profiles) · <span id="stamp"></span></footer>

<script>
const shots = [
  { file: "shots/iphone-15.png",          label: "iPhone 15",               dims: "393 × 852 · @3x", kind: "phone",  w: 240 },
  { file: "shots/iphone-15-pro-max.png",  label: "iPhone 15 Pro Max",       dims: "430 × 932 · @3x", kind: "phone",  w: 260 },
  { file: "shots/ipad-portrait.png",      label: "iPad Pro 11 — Portrait",  dims: "834 × 1194 · @2x", kind: "tablet", w: 340 },
  { file: "shots/ipad-landscape.png",     label: "iPad Pro 11 — Landscape", dims: "1194 × 834 · @2x", kind: "tablet", w: 460 },
  { file: "shots/laptop-1440.png",        label: "Laptop",                  dims: "1440 × 900 · @2x", kind: "desktop", w: 520 },
  { file: "shots/desktop-1080p.png",      label: "Desktop",                 dims: "1920 × 1080 · @1x", kind: "desktop", w: 640 },
];

const grid = document.getElementById("grid");
for (const s of shots) {
  const card = document.createElement("div");
  card.className = "card";
  let frame;
  if (s.kind === "phone") {
    frame = `<div class="frame-phone" style="width:${s.w}px">
      <div class="island"></div>
      <div class="screen shot-wrap"><img src="${s.file}" alt="${s.label}" loading="lazy"></div>
    </div>`;
  } else if (s.kind === "tablet") {
    frame = `<div class="frame-tablet" style="width:${s.w}px">
      <div class="screen shot-wrap"><img src="${s.file}" alt="${s.label}" loading="lazy"></div>
    </div>`;
  } else {
    frame = `<div style="width:${s.w}px">
      <div class="frame-desktop">
        <div class="screen shot-wrap"><img src="${s.file}" alt="${s.label}" loading="lazy"></div>
        <div class="chin">···</div>
      </div>
      <div class="stand"></div><div class="stand-base"></div>
    </div>`;
  }
  card.innerHTML = `${frame}<div class="meta"><div class="label">${s.label}</div><div class="dims">${s.dims}</div></div>`;
  card.querySelector(".shot-wrap").addEventListener("click", () => openLightbox(s));
  grid.appendChild(card);
}

const lb = document.getElementById("lightbox");
function openLightbox(s) {
  lb.querySelector("img").src = s.file;
  lb.querySelector(".cap").textContent = `${s.label} — ${s.dims}`;
  lb.classList.add("open");
}
lb.addEventListener("click", () => lb.classList.remove("open"));
addEventListener("keydown", (e) => { if (e.key === "Escape") lb.classList.remove("open"); });

document.getElementById("stamp").textContent = new Date(document.lastModified).toLocaleString();
</script>
</body>
</html>
