name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Test and build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PI_SQLITE_CONTRACT_TEST: skip
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.19.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run portable test suite
        run: npm test

      - name: Build frontend
        run: npm run build

      - name: Build documentation
        run: npm run docs:build

  container-e2e:
    name: Container and representative browser tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build release-fallback image
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: oyster:published
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.19.0
          cache: npm
          cache-dependency-path: tests/e2e/package-lock.json

      - name: Install browser test dependencies
        working-directory: tests/e2e
        run: npm ci

      - name: Install Chromium
        working-directory: tests/e2e
        run: npx playwright install --with-deps chromium

      - name: Run mobile and desktop smoke tests
        working-directory: tests/e2e
        run: npx playwright test mobile-modals.spec.js sessions.spec.js

      - name: Upload browser diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-diagnostics
          path: |
            tests/e2e/playwright-report
            tests/e2e/test-results
          if-no-files-found: ignore
          retention-days: 7
